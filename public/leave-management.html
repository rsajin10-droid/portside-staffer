<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Supervisor - Leave Management</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background-color: #f1f5f9; padding: 20px; }
        .container { max-width: 800px; margin: auto; background: white; padding: 20px; border-radius: 12px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
        h2 { color: #1e293b; border-bottom: 2px solid #e2e8f0; padding-bottom: 10px; }
        table { width: 100%; border-collapse: collapse; margin-top: 20px; }
        th, td { padding: 12px; text-align: left; border-bottom: 1px solid #e2e8f0; }
        th { background-color: #f8fafc; color: #64748b; }
        .btn { padding: 6px 12px; border: none; border-radius: 4px; cursor: pointer; font-weight: bold; margin-right: 5px; }
        .approve { background-color: #16a34a; color: white; }
        .reject { background-color: #dc2626; color: white; }
        .status-badge { padding: 4px 8px; border-radius: 12px; font-size: 12px; font-weight: bold; text-transform: uppercase; }
        .pending { background: #fef9c3; color: #854d0e; }
        .approved { background: #dcfce7; color: #166534; }
        .rejected { background: #fee2e2; color: #991b1b; }
    </style>
</head>
<body>

<div class="container">
    <h2>Leave Management System</h2>
    <table>
        <thead>
            <tr>
                <th>Driver Name</th>
                <th>Date</th>
                <th>Reason</th>
                <th>Status</th>
                <th>Action</th>
            </tr>
        </thead>
        <tbody id="leave-table-body">
            </tbody>
    </table>
</div>

<script>
    const supabaseUrl = 'https://owbsjzczcvfrnldpoaic.supabase.co';
    const supabaseKey = 'sb_publishable_01ukOcIWuYr2RLrxKE1R2w_bc9GHPTQ';
    const _supabase = supabase.createClient(supabaseUrl, supabaseKey);

    async function fetchLeaveRequests() {
        const { data, error } = await _supabase
            .from('leave_requests')
            .select('*')
            .order('created_at', { ascending: false });

        if (error) {
            console.error('Error fetching:', error);
            return;
        }

        const tableBody = document.getElementById('leave-table-body');
        tableBody.innerHTML = '';

        if (data) {
            data.forEach(request => {
                const currentStatus = request.status || 'pending';
                const row = `
                    <tr>
                        <td>${request.driver_name}</td>
                        <td>${request.leave_date}</td>
                        <td>${request.reason || 'No reason provided'}</td>
                        <td><span class="status-badge ${currentStatus}">${currentStatus}</span></td>
                        <td>
                            ${currentStatus === 'pending' ? `
                                <button class="btn approve" onclick="updateStatus('${request.id}', 'approved')">Approve</button>
                                <button class="btn reject" onclick="updateStatus('${request.id}', 'rejected')">Reject</button>
                            ` : '--'}
                        </td>
                    </tr>
                `;
                tableBody.innerHTML += row;
            });
        }
    }

    async function updateStatus(requestId, newStatus) {
        const { error } = await _supabase
            .from('leave_requests')
            .update({ status: newStatus })
            .eq('id', requestId);

        if (error) {
            alert('Update failed: ' + error.message);
        } else {
            alert('Request ' + newStatus + ' successfully!');
            fetchLeaveRequests();
        }
    }

    fetchLeaveRequests();
</script>

</body>
</html>
